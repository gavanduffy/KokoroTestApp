name: Build and upload nightly ipa

on:
  push:
    branches:
    - '**'
  workflow_dispatch:




jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Download Kokoro model
        run: |
          mkdir -p Resources
          curl -L -o Resources/kokoro-v1_0.safetensors \
            "https://huggingface.co/mlx-community/Kokoro-82M-4bit/resolve/c19ac4919188e0fc7f026cdef8b22a181707e2a5/kokoro-v1_0.safetensors"
          ls -lh Resources/kokoro-v1_0.safetensors
      - name: Get commit SHA
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Build
        run: xcodebuild -scheme KokoroTestApp -configuration Release archive -archivePath build/KokoroTestApp.xcarchive CODE_SIGN_IDENTITY= CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
        env:
          IS_NIGHTLY: YES
      - name: Package ipa
        run: |
          mkdir Payload
          cp -r build/KokoroTestApp.xcarchive/Products/Applications/KokoroTestApp.app Payload
          zip -r KokoroTestApp_nightly-${{ env.sha_short }}.ipa Payload
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KokoroTestApp_nightly-${{ env.sha_short }}.ipa
          path: KokoroTestApp_nightly-${{ env.sha_short }}.ipa
          if-no-files-found: error
